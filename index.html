<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 명언</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1b1b2f, #162447, #1a1a2e);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* 배경 장식 원 */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #f472b610, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #f472b608, transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* 날짜 뱃지 */
        .date-badge {
            display: inline-block;
            padding: 8px 24px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 30px;
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
        }

        /* 메인 명언 카드 */
        .quote-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 60px 50px;
            backdrop-filter: blur(20px);
            position: relative;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quote-mark {
            font-size: 5em;
            color: #f472b6;
            opacity: 0.3;
            font-family: Georgia, serif;
            line-height: 0.5;
            margin-bottom: 20px;
            display: block;
        }

        .quote-text {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.7em;
            font-weight: 700;
            line-height: 1.8;
            color: #f1f5f9;
            margin-bottom: 30px;
            word-break: keep-all;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #f472b6;
            margin: 0 auto 25px;
            opacity: 0.5;
        }

        .author {
            font-size: 1.1em;
            color: #f472b6;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .era {
            font-size: 0.8em;
            color: #64748b;
        }

        /* 어제의 명언 */
        .yesterday {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 40px;
            animation: fadeInUp 1.3s ease-out;
        }

        .yesterday-label {
            font-size: 0.75em;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .yesterday-quote {
            font-family: 'Noto Serif KR', serif;
            font-size: 0.95em;
            color: #94a3b8;
            line-height: 1.7;
            font-style: italic;
        }

        .yesterday-author {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 8px;
        }

        /* 푸터 */
        footer {
            font-size: 0.7em;
            color: #475569;
            margin-top: 20px;
            animation: fadeInUp 1.6s ease-out;
        }
        footer a {
            color: #64748b;
            text-decoration: none;
        }

        /* 반응형 */
        @media (max-width: 600px) {
            .quote-card { padding: 40px 25px; }
            .quote-text { font-size: 1.3em; }
            .quote-mark { font-size: 3em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date-badge">📅 2026-04-12</div>

        <div class="quote-card">
            <span class="quote-mark">"</span>
            <div class="quote-text">세상에서 가장 어려운 일은 사람의 마음을 바꾸는 것이다.</div>
            <div class="divider"></div>
            <div class="author">— 볼테르</div>
            <div class="era">18세기</div>
        </div>

        <div class="yesterday">
            <div class="yesterday-label">어제의 명언 · 2026-04-11</div>
            <div class="yesterday-quote">"실패해 본 적이 없는 사람은 새로운 것을 시도해 본 적이 없는 사람이다."</div>
            <div class="yesterday-author">— 알베르트 아인슈타인</div>
        </div>

        <footer>
            Powered by Python + GitHub Actions · 매일 아침 자동 업데이트<br>
            <a href="https://github.com">GitHub Pages</a>에서 호스팅
        </footer>
    </div>
</body>
</html>
